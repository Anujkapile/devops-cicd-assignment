apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-utility-hub
  labels:
    app: devops-utility-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-utility-hub
  template:
    metadata:
      labels:
        app: devops-utility-hub
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: devops-utility-hub
          image: yourdockerhubuser/devops-utility-hub:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
