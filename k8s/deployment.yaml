apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-utility-hub
  labels:
    app: devops-utility-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-utility-hub
  template:
    metadata:
      labels:
        app: devops-utility-hub
    spec:
      containers:
        - name: devops-utility-hub
          image: yourdockerhubuser/devops-utility-hub:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
         - name: nginx-exporter
           image: nginx/nginx-prometheus-exporter:0.11.0
           args: ["-nginx.scrape-uri=http://localhost:3000/nginx_status"]
           ports:
             - containerPort: 9113
